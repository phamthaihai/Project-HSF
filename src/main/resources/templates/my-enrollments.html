<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Enrollments</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">My Enrollments</h2>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">
        <tr>
            <th>Course</th>
            <th>Price</th>
            <th>Status</th>
            <th>Enroll Date</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="e : ${enrollments}">

            <td th:text="${e.course.title}"></td>

            <td th:text="${e.course.price}"></td>

            <td>

                <span class="badge bg-success"
                      th:if="${e.status == 'APPROVED'}">
                    Approved
                </span>

                <span class="badge bg-warning"
                      th:if="${e.status == 'PENDING'}">
                    Pending
                </span>

                <span class="badge bg-danger"
                      th:if="${e.status == 'REJECTED'}">
                    Rejected
                </span>

            </td>

            <td th:text="${#temporals.format(e.createdAt,'dd-MM-yyyy')}"></td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
