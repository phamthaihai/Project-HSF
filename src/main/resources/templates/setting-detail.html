<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Setting Details</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      background: #f4f6f9;
      font-family: Arial, sans-serif;
    }

    /* SIDEBAR */
    .sidebar {
      width: 230px;
      height: 100vh;
      background: #2f4050;
      color: white;
      position: fixed;
    }

    .sidebar h4 {
      padding: 20px;
      font-size: 18px;
    }

    .sidebar a {
      display: block;
      color: #cfd8dc;
      padding: 12px 20px;
      text-decoration: none;
    }

    .sidebar a:hover {
      background: #1c2833;
      color: white;
    }

    /* TOPBAR */
    .topbar {
      margin-left: 230px;
      height: 60px;
      background: #2f4050;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    /* MAIN CONTENT */
    .main {
      margin-left: 230px;
      padding: 25px;
    }

    /* FORM CONTAINER */
    .form-container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      max-width: 800px;
      margin-top: 20px;
    }

    .error {
      color: #dc3545;
      font-size: 13px;
      display: block;
      margin-top: 4px;
    }

  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>Learning Admin</h4>
  <a th:href="@{/courses}"><i class="fa fa-home"></i> Dashboard</a>
  <a href="#"><i class="fa fa-book"></i> Training Courses</a>
  <a href="#"><i class="fa fa-user-graduate"></i> Course Enrollments</a>
  <a th:href="@{/settings}"><i class="fa fa-cog"></i> System Settings</a>
  <a th:href="@{/users}"><i class="fa fa-users"></i> User Accounts</a>
  <a href="#"><i class="fa fa-file"></i> Post List</a>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <i class="fa fa-bars"></i>
  </div>
  <div style="display:flex; gap:15px; align-items:center;">
    <a th:href="@{/user-profile}" style="color:white; text-decoration:none;">
      <i class="fa fa-user"></i> Administrator
    </a>
    <a th:href="@{/logout}" style="color:white; text-decoration:none;">
      <i class="fa fa-sign-out-alt"></i> Logout
    </a>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="d-flex justify-content-between align-items-center mb-4" style="max-width: 800px;">
    <a th:href="@{/settings}" class="btn btn-outline-secondary">
      <i class="fa fa-arrow-left"></i> Back
    </a>
  </div>
  
  <h3 class="mb-4">Setting Details</h3>

  <div th:if="${err}" class="alert alert-danger" th:text="${err}" style="max-width: 800px;"></div>

  <div class="form-container">
    <form th:action="@{/settings/save}" th:object="${settingDTO}" method="post">
      <input type="hidden" th:field="*{id}">

      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label fw-bold">Name<span class="text-danger">*</span></label>
          <input type="text" class="form-control" th:field="*{name}">
          <small class="error" th:errors="*{name}"></small>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-bold">Type<span class="text-danger">*</span></label>
          <select class="form-select" th:field="*{typeId}">
            <option value="">-- Select Type --</option>
            <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.name}"></option>
          </select>
          <small class="error" th:errors="*{typeId}"></small>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-12">
          <label class="form-label fw-bold">Value</label>
          <input type="text" class="form-control" th:field="*{value}">
          <small class="error" th:errors="*{value}"></small>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label fw-bold">Priority<span class="text-danger">*</span></label>
          <input type="number" class="form-control" th:field="*{priority}">
          <small class="error" th:errors="*{priority}"></small>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-bold">Status</label>
          <div class="d-flex gap-3 mt-2">
            <div class="form-check">
              <input class="form-check-input" type="radio" th:field="*{status}" value="true" id="statusActive">
              <label class="form-check-label" for="statusActive">Active</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" th:field="*{status}" value="false" id="statusInactive">
              <label class="form-check-label" for="statusInactive">Inactive</label>
            </div>
          </div>
          <small class="error" th:errors="*{status}"></small>
        </div>
      </div>

      <div class="row mb-4">
        <div class="col-12">
          <label class="form-label fw-bold">Description</label>
          <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
          <small class="error" th:errors="*{description}"></small>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary px-4">Submit</button>
        <a th:href="@{/settings}" class="btn btn-secondary px-4">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
