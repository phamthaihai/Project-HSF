<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Change Password</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f6fa; margin: 0; padding: 30px; }
    .box { max-width: 600px; margin: auto; background: white; padding: 24px; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    h2 { margin-top: 0; }
    .row { margin-bottom: 14px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; }
    input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
    .error { color: red; font-size: 13px; }
    .danger { color: red; margin-bottom: 10px; }
    button, a.btn { display: inline-block; padding: 10px 16px; border: none; border-radius: 6px; text-decoration: none; cursor: pointer; }
    button { background: #2563eb; color: white; }
    a.btn { background: #6b7280; color: white; margin-left: 8px; }
  </style>
</head>
<body>
<div class="box">
  <h2>Change Password</h2>

  <div th:if="${error}" class="danger" th:text="${error}"></div>

  <form th:action="@{/change-password}" th:object="${changePasswordDTO}" method="post">
    <div class="row">
      <label>Current Password</label>
      <input type="password" th:field="*{oldPassword}">
      <div class="error" th:errors="*{oldPassword}"></div>
    </div>

    <div class="row">
      <label>New Password</label>
      <input type="password" th:field="*{newPassword}">
      <div class="error" th:errors="*{newPassword}"></div>
    </div>

    <div class="row">
      <label>Confirm Password</label>
      <input type="password" th:field="*{confirmPassword}">
      <div class="error" th:errors="*{confirmPassword}"></div>
    </div>

    <button type="submit">Submit</button>
    <a class="btn" th:href="@{/user-profile}">Back to Profile</a>
  </form>
</div>
</body>
</html>
