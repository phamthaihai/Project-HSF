<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>User Profile</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f6fa; margin: 0; padding: 30px; }
    .box { max-width: 700px; margin: auto; background: white; padding: 24px; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    h2 { margin-top: 0; }
    .row { margin-bottom: 14px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; }
    input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
    .error { color: red; font-size: 13px; }
    .success { color: green; margin-bottom: 10px; }
    .danger { color: red; margin-bottom: 10px; }
    button, a.btn { display: inline-block; padding: 10px 16px; border: none; border-radius: 6px; text-decoration: none; cursor: pointer; }
    button { background: #2563eb; color: white; }
    a.btn { background: #6b7280; color: white; margin-left: 8px; }
  </style>
</head>
<body>
<div class="box">
  <h2>User Profile</h2>

  <div th:if="${success}" class="success" th:text="${success}"></div>
  <div th:if="${error}" class="danger" th:text="${error}"></div>

  <form th:action="@{/user-profile}" th:object="${profileDTO}" method="post">
    <div class="row">
      <label>Full Name</label>
      <input type="text" th:field="*{fullName}">
      <div class="error" th:errors="*{fullName}"></div>
    </div>

    <div class="row">
      <label>Email</label>
      <input type="email" th:field="*{email}">
      <div class="error" th:errors="*{email}"></div>
    </div>

    <div class="row">
      <label>Phone</label>
      <input type="text" th:field="*{phone}">
      <div class="error" th:errors="*{phone}"></div>
    </div>

    <button type="submit">Update Profile</button>
    <a class="btn" th:href="@{/change-password}">Change Password</a>
  </form>
</div>
</body>
</html>
