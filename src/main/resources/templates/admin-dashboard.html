<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Admin Dashboard</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        body{
            background:#f4f6f9;
        }

        /* SIDEBAR */

        .sidebar{
            width:230px;
            height:100vh;
            background:#2f4050;
            color:white;
            position:fixed;
        }

        .sidebar h4{
            padding:20px;
            font-size:18px;
        }

        .sidebar a{
            display:block;
            color:#cfd8dc;
            padding:12px 20px;
            text-decoration:none;
        }

        .sidebar a:hover{
            background:#1c2833;
            color:white;
        }

        /* TOPBAR */

        .topbar{
            margin-left:230px;
            height:60px;
            background:#2f4050;
            color:white;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 20px;
        }

        /* MAIN CONTENT */

        .main{
            margin-left:230px;
            padding:25px;
        }

        /* DASHBOARD CARDS */

        .card-dashboard{
            border:none;
            border-radius:10px;
            padding:15px;
            background:white;
            box-shadow:0 2px 6px rgba(0,0,0,0.08);
        }

        .card-title{
            font-size:12px;
            color:#6c757d;
        }

        .card-number{
            font-size:24px;
            font-weight:bold;
        }

        .card-icon{
            font-size:24px;
            color:#888;
        }

        /* TABLE */

        .table-container{
            background:white;
            padding:20px;
            border-radius:10px;
            margin-top:25px;
            box-shadow:0 2px 6px rgba(0,0,0,0.08);
        }

        .status-badge{
            background:#28a745;
            padding:4px 10px;
            border-radius:5px;
            color:white;
            font-size:12px;
        }

    </style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <h4>Learning Admin</h4>

    <a href="#"><i class="fa fa-home"></i> Dashboard</a>

    <a href="#"><i class="fa fa-book"></i> Training Courses</a>

    <a href="#"><i class="fa fa-user-graduate"></i> Course Enrollments</a>

    <a href="#"><i class="fa fa-cog"></i> System Settings</a>

    <a th:href="@{/users}"><i class="fa fa-users"></i> User Accounts</a>

    <a href="#"><i class="fa fa-file"></i> Post List</a>

</div>


<!-- TOPBAR -->

<div class="topbar">

    <div>
        <i class="fa fa-bars"></i>
    </div>

    <div style="display:flex; gap:15px; align-items:center;">

        <a th:href="@{/user-profile}" style="color:white; text-decoration:none;">
            <i class="fa fa-user"></i> Administrator
        </a>

        <a th:href="@{/logout}" style="color:white; text-decoration:none;">
            <i class="fa fa-sign-out-alt"></i> Logout
        </a>

    </div>

</div>


<!-- MAIN -->

<div class="main">

    <h3 class="mb-4">Dashboard</h3>

    <div class="row g-3">

        <!-- USERS -->

        <div class="col-md-3">

            <div class="card-dashboard d-flex justify-content-between">

                <div>
                    <div class="card-title">TOTAL USERS</div>
                    <div class="card-number" th:text="${totalUsers}">4</div>
                </div>

                <div class="card-icon">
                    <i class="fa fa-users"></i>
                </div>

            </div>

        </div>

        <!-- COURSES -->

        <div class="col-md-3">

            <div class="card-dashboard d-flex justify-content-between">

                <div>
                    <div class="card-title">TOTAL COURSES</div>
                    <div class="card-number" th:text="${totalCourses}">7</div>
                </div>

                <div class="card-icon">
                    <i class="fa fa-book"></i>
                </div>

            </div>

        </div>

        <!-- POSTS -->

        <div class="col-md-3">

            <div class="card-dashboard d-flex justify-content-between">

                <div>
                    <div class="card-title">PUBLISHED POSTS</div>
                    <div class="card-number" th:text="${publishedPosts}">2</div>
                </div>

                <div class="card-icon">
                    <i class="fa fa-trophy"></i>
                </div>

            </div>

        </div>

        <!-- PUBLISHED COURSES -->

        <div class="col-md-3">

            <div class="card-dashboard d-flex justify-content-between">

                <div>
                    <div class="card-title">PUBLISHED COURSES</div>
                    <div class="card-number" th:text="${publishedCourses}">7</div>
                </div>

                <div class="card-icon">
                    <i class="fa fa-check-circle"></i>
                </div>

            </div>

        </div>

    </div>


    <!-- TABLE -->

    <div class="table-container">

        <h5>Recent Courses</h5>

        <table class="table table-bordered">

            <thead class="table-light">

            <tr>
                <th>Title</th>
                <th>Instructor</th>
                <th>Category</th>
                <th>Status</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="course : ${recentCourses}">

                <td th:text="${course.title}"></td>

                <td th:text="${course.instructor.fullName}"></td>

                <td th:text="${course.category.name}"></td>

                <td>
                    <span class="status-badge">Published</span>
                </td>

                <td th:text="${#temporals.format(course.createdAt,'yyyy-MM-dd')}"></td>

                <td>

                    <a class="btn btn-sm btn-primary"
                       th:href="@{/courses/edit/{id}(id=${course.id})}">
                        <i class="fa fa-edit"></i>
                    </a>

                    <a class="btn btn-sm btn-info">
                        <i class="fa fa-eye"></i>
                    </a>

                    <a class="btn btn-sm btn-danger"
                       th:href="@{/courses/delete/{id}(id=${course.id})}">
                        <i class="fa fa-trash"></i>
                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
