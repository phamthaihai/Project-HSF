<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | StudyHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body { background: #f4f6f9; margin: 0; transition: all 0.3s; }

        /* SIDEBAR */
        .sidebar {
            width: 230px;
            height: 100vh;
            background: #2f4050;
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            transition: all 0.3s;
            z-index: 1001;
        }

        .sidebar.collapsed { left: -230px; }

        .sidebar h4 { padding: 20px; font-size: 18px; border-bottom: 1px solid #3e4f5f; }

        .sidebar a {
            display: block;
            color: #cfd8dc;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.2s;
        }

        .sidebar a:hover { background: #1c2833; color: white; }

        /* TOPBAR */
        .topbar {
            margin-left: 230px;
            height: 60px;
            background: #2f4050;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            transition: all 0.3s;
        }

        .topbar.full-width { margin-left: 0; }

        #sidebarToggle {
            cursor: pointer;
            font-size: 20px;
            padding: 5px 10px;
            border-radius: 4px;
        }

        #sidebarToggle:hover { background: #3e4f5f; }

        /* MAIN CONTENT */
        .main {
            margin-left: 230px;
            padding: 25px;
            transition: all 0.3s;
        }

        .main.full-width { margin-left: 0; }

        /* DASHBOARD CARDS */
        .card-dashboard {
            border: none;
            border-radius: 10px;
            padding: 15px;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .card-title { font-size: 12px; color: #6c757d; font-weight: bold; }
        .card-number { font-size: 24px; font-weight: bold; color: #2f4050; }
        .card-icon { font-size: 24px; color: #6d28d9; opacity: 0.3; }

        /* TABLE */
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 25px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .status-badge {
            background: #28a745;
            padding: 4px 10px;
            border-radius: 5px;
            color: white;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="sidebar" id="sidebar">
    <h4>Learning Admin</h4>
    <a th:href="@{/admin/dashboard}"><i class="fa fa-home"></i> Dashboard</a>
    <a href="#"><i class="fa fa-book"></i> Training Courses</a>
    <a th:href="@{/admin/enrollments}"><i class="fa fa-user-graduate"></i> Course Enrollments</a>
    <a th:href="@{/settings}"><i class="fa fa-cog"></i> System Settings</a>
    <a th:href="@{/users}"><i class="fa fa-users"></i> User Accounts</a>
    <a href="#"><i class="fa fa-file"></i> Post List</a>
</div>

<div class="topbar" id="topbar">
    <div>
        <i class="fa fa-bars" id="sidebarToggle"></i>
    </div>

    <div style="display:flex; gap:15px; align-items:center;">
        <a th:href="@{/user-profile}" style="color:white; text-decoration:none;">
            <i class="fa fa-user"></i> Administrator
        </a>
        <a th:href="@{/logout}" style="color:white; text-decoration:none;">
            <i class="fa fa-sign-out-alt"></i> Logout
        </a>
    </div>
</div>

<div class="main" id="mainContent">
    <h3 class="mb-4">Dashboard Overview</h3>

    <div class="row g-3">
        <div class="col-md-3">
            <div class="card-dashboard d-flex justify-content-between">
                <div>
                    <div class="card-title">TOTAL USERS</div>
                    <div class="card-number" th:text="${totalUsers}">4</div>
                </div>
                <div class="card-icon"><i class="fa fa-users"></i></div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-dashboard d-flex justify-content-between">
                <div>
                    <div class="card-title">TOTAL COURSES</div>
                    <div class="card-number" th:text="${totalCourses}">7</div>
                </div>
                <div class="card-icon"><i class="fa fa-book"></i></div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-dashboard d-flex justify-content-between">
                <div>
                    <div class="card-title">PUBLISHED POSTS</div>
                    <div class="card-number" th:text="${publishedPosts}">2</div>
                </div>
                <div class="card-icon"><i class="fa fa-trophy"></i></div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-dashboard d-flex justify-content-between">
                <div>
                    <div class="card-title">PUBLISHED COURSES</div>
                    <div class="card-number" th:text="${publishedCourses}">7</div>
                </div>
                <div class="card-icon"><i class="fa fa-check-circle"></i></div>
            </div>
        </div>
    </div>

    <div class="table-container">
        <h5 class="mb-3">Recent Courses List</h5>
        <table class="table table-hover">
            <thead class="table-light">
            <tr>
                <th>Title</th>
                <th>Instructor</th>
                <th>Category</th>
                <th>Status</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${recentCourses}">
                <td th:text="${course.title}"></td>
                <td th:text="${course.instructor.fullName}"></td>
                <td th:text="${course.category.name}"></td>
                <td><span class="status-badge">Published</span></td>
                <td th:text="${#temporals.format(course.createAt,'yyyy-MM-dd')}"></td>
                <td>
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/courses/edit/{id}(id=${course.courseId})}">
                        <i class="fa fa-edit"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const toggleBtn = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        const topbar = document.getElementById('topbar');
        const main = document.getElementById('mainContent');

        toggleBtn.addEventListener('click', function() {
            sidebar.classList.toggle('collapsed');
            topbar.classList.toggle('full-width');
            main.classList.toggle('full-width');
        });
    });
</script>

</body>
</html>
