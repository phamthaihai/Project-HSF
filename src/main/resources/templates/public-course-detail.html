<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Public Courses</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }

        .container {
            width: 1180px;
            max-width: calc(100% - 40px);
            margin: 32px auto;
        }

        .page-title {
            font-size: 34px;
            font-weight: 800;
            margin: 0 0 20px;
        }

        .toolbar {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            background: #fff;
            padding: 18px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
            margin-bottom: 24px;
        }

        .toolbar input,
        .toolbar select {
            height: 44px;
            padding: 0 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
            background: #fff;
        }

        .toolbar input {
            min-width: 300px;
            flex: 1;
        }

        .toolbar select {
            min-width: 220px;
        }

        .toolbar button {
            height: 44px;
            padding: 0 18px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .toolbar button:hover {
            background: #1d4ed8;
        }

        .empty {
            background: white;
            padding: 22px;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
        }

        .card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
            display: flex;
            flex-direction: column;
        }

        .thumb {
            width: 100%;
            height: 210px;
            object-fit: cover;
            background: #e5e7eb;
        }

        .content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .course-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1.35;
            min-height: 54px;
        }

        .meta {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 6px;
        }

        .desc {
            font-size: 14px;
            color: #374151;
            line-height: 1.6;
            margin: 10px 0 14px;
            min-height: 68px;
        }

        .price {
            font-size: 20px;
            font-weight: 800;
            color: #2563eb;
            margin-top: auto;
            margin-bottom: 14px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            text-align: center;
            padding: 11px 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }

        .btn-outline {
            border: 1px solid #cbd5e1;
            color: #111827;
            background: #fff;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            border: 1px solid #2563eb;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        @media (max-width: 1000px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 680px) {
            .container {
                max-width: calc(100% - 24px);
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .toolbar input,
            .toolbar select,
            .toolbar button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="page-title">Public Courses</h1>

    <form class="toolbar" th:action="@{/public-courses}" method="get">
        <input type="text"
               name="keyword"
               placeholder="Search by course title..."
               th:value="${keyword}">

        <select name="categoryId">
            <option value="">All Categories</option>
            <option th:each="cat : ${categories}"
                    th:value="${cat.categoryId}"
                    th:text="${cat.name}"
                    th:selected="${categoryId != null and categoryId == cat.categoryId}">
            </option>
        </select>

        <button type="submit">Search</button>
    </form>

    <div th:if="${#lists.isEmpty(courses)}" class="empty">
        No public courses found.
    </div>

    <div class="grid" th:if="${!#lists.isEmpty(courses)}">
        <div class="card" th:each="c : ${courses}">
            <img class="thumb"
                 th:src="${c.thumbnailUrl != null and !#strings.isEmpty(c.thumbnailUrl)
                          ? c.thumbnailUrl : 'https://via.placeholder.com/600x350?text=Course'}"
                 alt="thumbnail">

            <div class="content">
                <div class="course-title" th:text="${c.title}"></div>

                <div class="meta">
                    Category:
                    <span th:text="${c.category != null ? c.category.name : 'N/A'}"></span>
                </div>

                <div class="meta">
                    Level:
                    <span th:text="${c.level}"></span>
                </div>

                <div class="meta">
                    Duration:
                    <span th:text="${c.duration}"></span> hours
                </div>

                <div class="desc" th:text="${c.description}"></div>

                <div class="price">
                    <span th:text="${#numbers.formatDecimal(c.price, 1, 'COMMA', 0, 'POINT')}"></span>
                </div>

                <div class="actions">
                    <a th:href="@{/public-courses/{id}(id=${c.courseId})}" class="btn btn-outline">View Details</a>
                    <a th:href="@{/enroll/{id}(id=${c.courseId})}" class="btn btn-primary">Enroll Now</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
