<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Detail</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }

        .container {
            width: 1100px;
            max-width: calc(100% - 40px);
            margin: 32px auto;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 18px;
            color: #2563eb;
            text-decoration: none;
            font-weight: 700;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 24px;
        }

        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        .thumb {
            width: 100%;
            height: 360px;
            object-fit: cover;
            background: #e5e7eb;
        }

        .content {
            padding: 22px;
        }

        .title {
            margin: 0 0 14px;
            font-size: 32px;
            font-weight: 800;
            line-height: 1.3;
        }

        .desc {
            line-height: 1.7;
            color: #374151;
            white-space: pre-line;
        }

        .side {
            padding: 22px;
        }

        .box-title {
            margin: 0 0 16px;
            font-size: 22px;
            font-weight: 800;
        }

        .info {
            font-size: 15px;
            color: #374151;
            margin-bottom: 12px;
        }

        .price {
            font-size: 28px;
            font-weight: 800;
            color: #2563eb;
            margin: 18px 0;
        }

        .btn {
            display: block;
            width: 100%;
            text-align: center;
            padding: 13px 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            background: #2563eb;
            color: white;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .thumb {
                height: 260px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <a class="back-link" th:href="@{/public-courses}">← Back to Public Courses</a>

    <div class="layout">
        <div class="card">
            <img class="thumb"
                 th:src="${course.thumbnailUrl != null and !#strings.isEmpty(course.thumbnailUrl)
                          ? course.thumbnailUrl : 'https://via.placeholder.com/900x500?text=Course+Detail'}"
                 alt="course image">

            <div class="content">
                <h1 class="title" th:text="${course.title}"></h1>
                <div class="desc" th:text="${course.description}"></div>
            </div>
        </div>

        <div class="card side">
            <h2 class="box-title">Course Information</h2>

            <div class="info">
                <strong>Category:</strong>
                <span th:text="${course.category != null ? course.category.name : 'N/A'}"></span>
            </div>

            <div class="info">
                <strong>Level:</strong>
                <span th:text="${course.level}"></span>
            </div>

            <div class="info">
                <strong>Duration:</strong>
                <span th:text="${course.duration}"></span> hours
            </div>

            <div class="info">
                <strong>Instructor:</strong>
                <span th:text="${course.instructor != null ? course.instructor.fullName : 'N/A'}"></span>
            </div>

            <div class="price">
                <span th:text="${#numbers.formatDecimal(course.price, 1, 'COMMA', 0, 'POINT')}"></span>
            </div>

            <a class="btn" th:href="@{/enroll/{id}(id=${course.courseId})}">Enroll Now</a>
        </div>
    </div>
</div>
</body>
</html>
