<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Course Enrollments</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>

        .badge-pending{
            background:#f0ad4e;
        }

        .badge-approved{
            background:#28a745;
        }

        .badge-rejected{
            background:#6c757d;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Course Enrollments</h2>

    <!-- FILTER -->
    <form method="get" th:action="@{/admin/enrollments}">

        <div class="row mb-3">

            <div class="col">
                <select name="courseId" class="form-select">
                    <option value="">All Courses</option>

                    <option th:each="c : ${courses}"
                            th:value="${c.courseId}"
                            th:text="${c.title}">
                    </option>

                </select>
            </div>

            <div class="col">
                <select name="userId" class="form-select">
                    <option value="">All Users</option>

                    <option th:each="u : ${users}"
                            th:value="${u.userId}"
                            th:text="${u.fullName}">
                    </option>

                </select>
            </div>

            <div class="col">
                <select name="status" class="form-select">
                    <option value="">All</option>
                    <option value="PENDING">Pending</option>
                    <option value="APPROVED">Approved</option>
                    <option value="REJECTED">Rejected</option>
                </select>
            </div>

            <div class="col">
                <input type="text"
                       name="keyword"
                       class="form-control"
                       placeholder="Full Name, Email, Course">
            </div>

            <div class="col">
                <button class="btn btn-primary">
                    Filter
                </button>
            </div>

        </div>

    </form>

    <!-- TABLE -->

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Course</th>
            <th>User Info</th>
            <th>Enrolled At</th>
            <th>Status</th>
            <th>Progress</th>
            <th>Actions</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="e : ${enrollments}">

            <td th:text="${e.enrollmentId}"></td>

            <td th:text="${e.course.title}"></td>

            <td>

                <b th:text="${e.fullName}"></b><br>

                <span th:text="${e.email}"></span>

            </td>

            <td th:text="${#temporals.format(e.registeredAt,'yyyy-MM-dd HH:mm:ss')}"></td>

            <td>

<span th:if="${e.status=='PENDING'}"
      class="badge badge-pending">
Pending
</span>

                <span th:if="${e.status=='APPROVED'}"
                      class="badge badge-approved">
Approved
</span>

                <span th:if="${e.status=='REJECTED'}"
                      class="badge badge-rejected">
Rejected
</span>

            </td>

            <td>

                0.00

            </td>

            <td>

                <a th:href="@{/admin/enrollments/{id}(id=${e.enrollmentId})}"
                   class="btn btn-sm btn-primary">
                    View
                </a>

                <a th:href="@{/admin/enrollments/delete/{id}(id=${e.enrollmentId})}"
                   class="btn btn-sm btn-danger">
                    Delete
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
