<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Courses Management</title>
</head>
<style>body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f6f7fb;
}

.container {
    width: 90%;
    margin: auto;
}

/* BOX */

.box {
    border: 2px solid #4c74af;
    padding: 20px;
    margin-bottom: 30px;
    background: white;
}

/* HEADER */

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* BUTTON */

.btn-add {
    background: #2e7be6;
    color: white;
    padding: 6px 12px;
    border-radius: 3px;
    text-decoration: none;
}

/* TABLE */

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

table th {
    background: #f0f0f0;
    padding: 10px;
    text-align: left;
}

table td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

tr:hover {
    background: #f9f9f9;
}

/* STATUS BADGE */

.status {
    background: #2ecc71;
    color: white;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
}

/* ACTION BUTTON */

.action-btn {
    padding: 4px 6px;
    border-radius: 3px;
    text-decoration: none;
    margin-right: 5px;
}

.edit {
    background: #3fa9f5;
    color: white;
}

.delete {
    background: #e74c3c;
    color: white;
}

/* FORM */

.form-row {
    display: flex;
    gap: 20px;
    margin-bottom: 15px;
}

.form-group {
    flex: 1;
}

input, select, textarea {
    width: 100%;
    padding: 6px;
    border: 1px solid #ccc;
}

textarea {
    height: 120px;
}

/* THUMBNAIL */

.thumbnail-box {
    width: 200px;
}

.thumbnail-box img {
    width: 100%;
    border: 1px solid #ccc;
}

.submit-btn {
    margin-top: 10px;
    padding: 6px 15px;
}</style>
<body>
<div class="container box">

    <div class="header">
        <h3>Courses Management</h3>

        <a class="btn-add" th:href="@{/courses/add}">+ Add New Course</a>
    </div>

    <table>

        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Manager</th>
            <th>Category</th>
            <th>Price</th>
            <th>Status</th>
            <th>Created</th>
            <th>Actions</th>
        </tr>

        <tr th:each="c : ${courses}">

            <td th:text="${c.courseId}"></td>

            <td th:text="${c.title}"></td>

            <td th:text="${c.instructor != null ? c.instructor.fullName : 'N/A'}"></td>

            <td th:text="${c.category != null ? c.category.name : 'N/A'}"></td>

            <td th:text="${c.price}"></td>

            <td>
                    <span class="status" th:if="${c.published}">
                        Published
                    </span>
                                    <span class="status" th:if="${!c.published}" style="background:#9ca3af;">
                        Unpublished
                    </span>
            </td>

            <td th:text="${c.createAt}"></td>

            <td>

                <a class="action-btn edit"
                   th:href="@{/courses/edit/{id}(id=${c.courseId})}">
                    ✏
                </a>

                <a class="action-btn delete"
                   th:href="@{/courses/delete/{id}(id=${c.courseId})}">
                    🗑
                </a>

            </td>

        </tr>

    </table>

</div>

</body>
</html>
