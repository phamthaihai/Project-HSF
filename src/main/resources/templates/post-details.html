<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Post Details</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f6fa; margin: 0; padding: 24px; }
        .box { max-width: 900px; margin: auto; background: white; padding: 24px; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
        .row { margin-bottom: 14px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        textarea { min-height: 120px; }
        .error { color: red; font-size: 13px; }
        .danger { color: red; margin-bottom: 10px; }
        button, a.btn { display: inline-block; padding: 10px 16px; border: none; border-radius: 6px; text-decoration: none; cursor: pointer; }
        button { background: #2563eb; color: white; }
        a.btn { background: #6b7280; color: white; margin-left: 8px; }
    </style>
</head>
<body>
<div class="box">
    <h2 th:text="${isEdit} ? 'Edit Post' : 'New Post'"></h2>

    <div th:if="${error}" class="danger" th:text="${error}"></div>

    <form th:action="@{/posts/save}" th:object="${postDTO}" method="post">
        <input type="hidden" th:field="*{postId}">

        <div class="row">
            <label>Title</label>
            <input type="text" th:field="*{name}">
            <div class="error" th:errors="*{name}"></div>
        </div>

        <div class="row">
            <label>Category</label>
            <input type="text" th:field="*{type}" placeholder="Example: Lap trinh">
            <div class="error" th:errors="*{type}"></div>
        </div>

        <div class="row">
            <label>Description</label>
            <textarea th:field="*{description}"></textarea>
            <div class="error" th:errors="*{description}"></div>
        </div>

        <div class="row">
            <label>Content</label>
            <textarea th:field="*{content}" style="min-height: 250px;"></textarea>
            <div class="error" th:errors="*{content}"></div>
        </div>

        <div class="row">
            <label>Status</label>
            <select th:field="*{status}">
                <option value="Draft">Draft</option>
                <option value="Published">Published</option>
                <option value="Hidden">Hidden</option>
            </select>
            <div class="error" th:errors="*{status}"></div>
        </div>

        <button type="submit">Save</button>
        <a class="btn" th:href="@{/posts}">Back to List</a>
    </form>
</div>
</body>
</html>
