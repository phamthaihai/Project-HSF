<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Edit Lesson</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 900px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #d0d7e5;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            padding: 20px 24px 26px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .header h3 {
            margin: 0;
            font-size: 18px;
        }

        .back-btn {
            padding: 5px 12px;
            border-radius: 3px;
            border: 1px solid #ccc;
            background: #eee;
            color: #333;
            text-decoration: none;
            font-size: 13px;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .form-group {
            flex: 1;
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
            font-weight: 600;
        }

        label span {
            color: red;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 7px 8px;
            border-radius: 3px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }

        .note {
            font-size: 12px;
            color: #777;
            margin-top: 3px;
        }

        .checkbox-inline {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            font-size: 13px;
        }

        .btn-submit {
            margin-top: 10px;
            padding: 6px 16px;
            border-radius: 3px;
            border: 1px solid #2e7be6;
            background: #2e7be6;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-submit:hover {
            background: #245fb5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3>
            Edit Lesson -
            <span th:text="${chapter.chaptertTitle}">Chapter name</span>
        </h3>
        <a class="back-btn"
           th:href="@{/courses/{id}/content(id=${chapter.course.courseId})}">&larr; Back to Course</a>
    </div>

    <form th:action="@{/courses/lesson/save}" th:object="${lesson}" method="post">
        <input type="hidden" th:field="*{lessonId}">
        <input type="hidden" name="chapterId" th:value="${chapter.chapterId}">

        <div class="form-row">
            <div class="form-group">
                <label>Lesson Title <span>*</span></label>
                <input type="text" th:field="*{title}" required>
            </div>
            <div class="form-group">
                <label>Duration (Minutes)</label>
                <input type="number" th:field="*{duration}" min="0">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Content Type <span>*</span></label>
                <select th:field="*{contentType}">
                    <option value="Video">Video</option>
                    <option value="Document">Document</option>
                    <option value="Quiz">Quiz</option>
                </select>
            </div>
            <div class="form-group">
                <label>Order <span>*</span></label>
                <input type="number" th:field="*{order}" min="1">
                <div class="note">The order in which this lesson appears in the chapter</div>
            </div>
        </div>

        <div class="form-group">
            <label>Content Video</label>
            <input type="text" th:field="*{contentVideo}" placeholder="YouTube URL or direct video file URL">
        </div>

        <div class="checkbox-inline">
            <input type="checkbox" th:field="*{preview}" id="previewLesson">
            <label for="previewLesson" style="margin:0;">Preview Lesson<br>
                <span class="note">Preview lessons can be watched without enrollment</span>
            </label>
        </div>

        <button class="btn-submit" type="submit">Update Lesson</button>
    </form>
</div>

</body>
</html>
