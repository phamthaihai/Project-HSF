<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Edit Chapter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 900px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #d0d7e5;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            padding: 20px 24px 26px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .header h3 {
            margin: 0;
            font-size: 18px;
        }

        .back-btn {
            padding: 5px 12px;
            border-radius: 3px;
            border: 1px solid #ccc;
            background: #eee;
            color: #333;
            text-decoration: none;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
            font-weight: 600;
        }

        label span {
            color: red;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 7px 8px;
            border-radius: 3px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .note {
            font-size: 12px;
            color: #777;
            margin-top: 3px;
        }

        .btn-submit {
            margin-top: 10px;
            padding: 6px 16px;
            border-radius: 3px;
            border: 1px solid #2e7be6;
            background: #2e7be6;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-submit:hover {
            background: #245fb5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3>
            <span th:text="${chapter.chapterId != null ? 'Edit Chapter' : 'Add Chapter'}">Chapter</span> -
            <span th:text="${course.title}">Course name</span>
        </h3>
        <a class="back-btn"
           th:href="@{/courses/{id}/content(id=${course.courseId})}">&larr; Back to Course</a>
    </div>

    <form th:action="@{/courses/chapter/save}" th:object="${chapter}" method="post">
        <input type="hidden" th:field="*{chapterId}">
        <input type="hidden" name="courseId" th:value="${course.courseId}">

        <div class="form-group">
            <label>Chapter Title <span>*</span></label>
            <input type="text" th:field="*{title}" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea th:field="*{description}"></textarea>
        </div>

        <div class="form-group">
            <label>Order <span>*</span></label>
            <input type="number" th:field="*{chapterOrder}" min="1">
            <div class="note">The order in which this chapter appears in the course</div>
        </div>

        <button class="btn-submit" type="submit" th:text="${chapter.chapterId != null ? 'Update Chapter' : 'Create Chapter'}">Save Chapter</button>
    </form>
</div>

</body>
</html>
