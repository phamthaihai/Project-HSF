<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Post List</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f6fa; margin: 0; padding: 24px; }
    .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    h2 { margin-top: 0; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    form.filter { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    input, select, button, a.btn { padding: 10px; border: 1px solid #ccc; border-radius: 6px; text-decoration: none; }
    button, a.btn { background: #2563eb; color: white; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: top; }
    th { background: #f3f4f6; }
    .badge { padding: 4px 8px; border-radius: 999px; font-size: 12px; background: #e5e7eb; }
  </style>
</head>
<body>
<div class="box">
  <div class="topbar">
    <h2>Post List</h2>
    <a class="btn" th:href="@{/posts/new}">New Post</a>
  </div>

  <form class="filter" method="get" th:action="@{/posts}">
    <input type="text" name="keyword" placeholder="Search title..." th:value="${keyword}">
    <select name="category">
      <option value="">All Categories</option>
      <option th:each="c : ${categories}" th:value="${c}" th:text="${c}" th:selected="${category == c}"></option>
    </select>
    <select name="status">
      <option value="">All Status</option>
      <option value="Draft" th:selected="${status == 'Draft'}">Draft</option>
      <option value="Published" th:selected="${status == 'Published'}">Published</option>
      <option value="Hidden" th:selected="${status == 'Hidden'}">Hidden</option>
    </select>
    <button type="submit">Search</button>
  </form>

  <table>
    <thead>
    <tr>
      <th>ID</th>
      <th>Title</th>
      <th>Category</th>
      <th>Author</th>
      <th>Status</th>
      <th>Updated At</th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${posts}">
      <td th:text="${p.postId}"></td>
      <td th:text="${p.name}"></td>
      <td th:text="${p.type}"></td>
      <td th:text="${p.user != null ? p.user.fullName : 'N/A'}"></td>
      <td><span class="badge" th:text="${p.status}"></span></td>
      <td th:text="${p.updatedAt}"></td>
      <td>
        <a th:href="@{'/posts/' + ${p.postId}}">Edit</a>
      </td>
    </tr>
    <tr th:if="${#lists.isEmpty(posts)}">
      <td colspan="7">No posts found.</td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
