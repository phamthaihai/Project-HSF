<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Register</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Times New Roman", serif;
            background: #ffffff;
            color: #000;
        }

        .page-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .global-error {
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .global-success {
            color: green;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .register-wrapper {
            width: 360px;
            border: 1px solid #333;
            background: #f3f3f3;
            padding: 22px 18px 18px 18px;
        }

        .register-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 14px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            height: 36px;
            padding: 4px 8px;
            border: 1px solid #999;
            border-radius: 3px;
            background: #fff;
        }

        .btn-register {
            width: 100%;
            height: 38px;
            margin-top: 8px;
            border: 1px solid #999;
            border-radius: 3px;
            background: linear-gradient(#fefefe, #e5e5e5);
            cursor: pointer;
            font-family: "Times New Roman", serif;
            font-size: 16px;
        }

        .btn-register:hover {
            background: linear-gradient(#ffffff, #dcdcdc);
        }

        .bottom-link {
            margin-top: 12px;
            text-align: center;
            font-size: 14px;
        }

        .bottom-link a {
            color: blue;
            text-decoration: underline;
        }

        .error-text {
            color: red;
            font-size: 12px;
            display: block;
            margin-top: 3px;
        }
    </style>
</head>
<body>

<div class="page-container">
    <div th:if="${err}" class="global-error" th:text="${err}"></div>
    <div th:if="${msg}" class="global-success" th:text="${msg}"></div>

    <div class="register-wrapper">
        <div class="register-title">User Register</div>

        <form th:action="@{/register}" th:object="${registerDTO}" method="post">
            <div class="form-group">
                <label>Full Name*</label>
                <input type="text" th:field="*{fullname}">
                <small class="error-text" th:errors="*{fullname}"></small>
            </div>

            <div class="form-group">
                <label>Email*</label>
                <input type="email" th:field="*{email}">
                <small class="error-text" th:errors="*{email}"></small>
            </div>

            <div class="form-group">
                <label>Phone*</label>
                <input type="text" th:field="*{phone}">
                <small class="error-text" th:errors="*{phone}"></small>
            </div>

            <div class="form-group">
                <label>Password*</label>
                <input type="password" th:field="*{password}">
                <small class="error-text" th:errors="*{password}"></small>
            </div>

            <div class="form-group">
                <label>Password Confirm*</label>
                <input type="password" th:field="*{confirmPassword}">
                <small class="error-text" th:errors="*{confirmPassword}"></small>
                <small class="error-text" th:if="${#fields.hasErrors('passwordMatch')}" th:errors="*{passwordMatch}"></small>
            </div>

            <button type="submit" class="btn-register">Register</button>

            <div class="bottom-link">
                Already have an account?
                <a th:href="@{/login}">Login here</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
