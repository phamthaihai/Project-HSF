<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      margin: 0;
      padding: 40px;
    }
    .box {
      max-width: 450px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }
    h2 {
      margin-top: 0;
      text-align: center;
    }
    .row {
      margin-bottom: 14px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .error {
      color: red;
      font-size: 13px;
      margin-top: 4px;
    }
    .msg-error {
      color: red;
      margin-bottom: 12px;
    }
    .msg-success {
      color: green;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    .links {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
    }
    .links a {
      color: #2563eb;
      text-decoration: none;
      margin: 0 4px;
    }
  </style>
</head>
<body>
<div class="box">
  <h2>Login</h2>

  <div th:if="${error}" class="msg-error" th:text="${error}"></div>
  <div th:if="${success}" class="msg-success" th:text="${success}"></div>

  <form th:action="@{/login}" th:object="${loginDTO}" method="post">
    <div class="row">
      <label>Email</label>
      <input type="email" th:field="*{email}">
      <div class="error" th:errors="*{email}"></div>
    </div>

    <div class="row">
      <label>Password</label>
      <input type="password" th:field="*{password}">
      <div class="error" th:errors="*{password}"></div>
    </div>

    <button type="submit">Login</button>
  </form>

  <div class="links">
    <a th:href="@{/forgot-password}">Quên mật khẩu?</a>
    |
    <a th:href="@{/register}">Đăng ký tài khoản mới</a>
  </div>
</div>
</body>
</html>
