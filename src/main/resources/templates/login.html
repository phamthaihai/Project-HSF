<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Login</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Times New Roman", serif;
            background: #ffffff;
            color: #000;
        }

        .page-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .global-error {
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .global-success {
            color: green;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .login-wrapper {
            width: 360px;
            border: 1px solid #333;
            background: #f3f3f3;
            padding: 22px 18px 18px 18px;
        }

        .login-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 14px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            height: 36px;
            padding: 4px 8px;
            border: 1px solid #999;
            border-radius: 3px;
            background: #fff;
        }

        .helper-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .helper-row a {
            color: blue;
            text-decoration: underline;
            white-space: nowrap;
        }

        .helper-row span {
            color: #555;
        }

        .btn-login {
            width: 100%;
            height: 38px;
            margin-top: 4px;
            border: 1px solid #999;
            border-radius: 3px;
            background: linear-gradient(#fefefe, #e5e5e5);
            cursor: pointer;
            font-family: "Times New Roman", serif;
            font-size: 16px;
        }

        .btn-login:hover {
            background: linear-gradient(#ffffff, #dcdcdc);
        }

        .error-text {
            color: red;
            font-size: 12px;
            display: block;
            margin-top: 3px;
        }
    </style>
</head>
<body>

<div class="page-container">
    <div th:if="${error}" class="global-error" th:text="${error}"></div>
    <div th:if="${success}" class="global-success" th:text="${success}"></div>

    <div class="login-wrapper">
        <div class="login-title">User Login</div>

        <form th:action="@{/login}" th:object="${loginDTO}" method="post">
            <div class="form-group">
                <label>Email*</label>
                <input type="email" th:field="*{email}">
                <small class="error-text" th:errors="*{email}"></small>
            </div>

            <div class="form-group">
                <label>Password*</label>
                <input type="password" th:field="*{password}">
                <small class="error-text" th:errors="*{password}"></small>
            </div>

            <div class="helper-row">
                <a th:href="@{/register}">Don't have an account?</a>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>
    </div>
</div>

</body>
</html>
