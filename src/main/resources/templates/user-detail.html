<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>User Details</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f6fa; margin: 0; padding: 24px; }
    .box { max-width: 700px; margin: auto; background: white; padding: 24px; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    h2 { margin-top: 0; }
    .row { display: flex; gap: 16px; margin-bottom: 14px; }
    .group { flex: 1; }
    label { display: block; margin-bottom: 6px; font-weight: bold; }
    input, select { width: 100%; padding: 9px 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    .error { color: red; font-size: 13px; margin-top: 4px; display: block; }
    .global-error { color: red; margin-bottom: 10px; }
    .actions { margin-top: 16px; display: flex; gap: 10px; }
    button, a.btn { padding: 9px 16px; border-radius: 6px; border: none; cursor: pointer; text-decoration: none; }
    button { background: #2563eb; color: white; }
    a.btn { background: #6b7280; color: white; }
  </style>
</head>
<body>
<div class="box">

  <div th:if="${err}" class="global-error" th:text="${err}"></div>

  <form th:action="@{/users/save}" th:object="${userDTO}" method="post">

    <h2 th:text="${#fields.hasErrors('*') ? 'User Details (Has errors)' : (userDTO.id == null ? 'Create User' : 'Edit User')}">
      User Details
    </h2>

    <input type="hidden" th:field="*{id}">

    <div class="row">
      <div class="group">
        <label>Full Name*</label>
        <input type="text" th:field="*{fullName}">
        <span class="error" th:errors="*{fullName}"></span>
      </div>
      <div class="group">
        <label>Email*</label>
        <input type="email" th:field="*{email}">
        <span class="error" th:errors="*{email}"></span>
      </div>
    </div>

    <div class="row">
      <div class="group">
        <label>Phone*</label>
        <input type="text" th:field="*{phone}">
        <span class="error" th:errors="*{phone}"></span>
      </div>
      <div class="group">
        <label>Role*</label>
        <select th:field="*{roleId}">
          <option value="">-- Select Role --</option>
          <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.name}"></option>
        </select>
        <span class="error" th:errors="*{roleId}"></span>
      </div>
    </div>

    <div class="row">
      <div class="group">
        <label>Status*</label>
        <select th:field="*{status}">
          <option value="">-- Select Status --</option>
          <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
        </select>
        <span class="error" th:errors="*{status}"></span>
      </div>
      <div class="group">
        <label>Email Verified</label>
        <select th:field="*{emailVerified}">
          <option th:value="true">Yes</option>
          <option th:value="false">No</option>
        </select>
        <span class="error" th:errors="*{emailVerified}"></span>
      </div>
    </div>

    <div class="row">
      <div class="group">
        <label th:text="${userDTO.id == null ? 'Password*' : 'Password (leave blank to keep current)'}">
          Password
        </label>
        <input type="password" th:field="*{password}">
        <span class="error" th:errors="*{password}"></span>
      </div>
    </div>

    <div class="actions">
      <button type="submit">Save</button>
      <a class="btn" th:href="@{/users}">Back to list</a>
    </div>

  </form>

</div>
</body>
</html>
