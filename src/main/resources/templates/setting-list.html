<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Setting List</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      background: #f4f6f9;
      font-family: Arial, sans-serif;
    }

    /* SIDEBAR */
    .sidebar {
      width: 230px;
      height: 100vh;
      background: #2f4050;
      color: white;
      position: fixed;
    }

    .sidebar h4 {
      padding: 20px;
      font-size: 18px;
    }

    .sidebar a {
      display: block;
      color: #cfd8dc;
      padding: 12px 20px;
      text-decoration: none;
    }

    .sidebar a:hover {
      background: #1c2833;
      color: white;
    }

    /* TOPBAR */
    .topbar {
      margin-left: 230px;
      height: 60px;
      background: #2f4050;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    /* MAIN CONTENT */
    .main {
      margin-left: 230px;
      padding: 25px;
    }

    /* TABLE CONTAINER */
    .table-container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      margin-top: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .filters {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .status-badge {
      background: #28a745;
      padding: 4px 10px;
      border-radius: 5px;
      color: white;
      font-size: 12px;
    }

    .status-inactive {
      background: #dc3545;
    }

    a {
      text-decoration: none;
    }

    th a {
      color: black;
    }
    th a:hover {
      color: #333;
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>Learning Admin</h4>
  <a th:href="@{/courses}"><i class="fa fa-home"></i> Dashboard</a>
  <a th:href="@{/courses}">
    <i class="fa fa-book me-2"></i> Training Courses
  </a>
  <a href="#"><i class="fa fa-user-graduate"></i> Course Enrollments</a>
  <a th:href="@{/settings}"><i class="fa fa-cog"></i> System Settings</a>
  <a th:href="@{/users}"
     th:if="${session.user != null
           and session.user.role != null
           and session.user.role.name == 'ADMIN'}">
    <i class="fa fa-users"></i> User Accounts
  </a>
  <a th:href="@{/posts}">
    <i class="fa fa-file-alt me-2"></i> Post List
  </a>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <i class="fa fa-bars"></i>
  </div>
  <div style="display:flex; gap:15px; align-items:center;">
    <a th:href="@{/user-profile}" style="color:white;">
      <i class="fa fa-user"></i> Administrator
    </a>
    <a th:href="@{/logout}" style="color:white;">
      <i class="fa fa-sign-out-alt"></i> Logout
    </a>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <h3 class="mb-4">Setting List</h3>

  <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>
  <div th:if="${err}" class="alert alert-danger" th:text="${err}"></div>

  <div class="table-container">
    <form th:action="@{/settings}" method="get" class="top-bar">
      <div class="filters">
        <select name="typeId" class="form-select w-auto">
          <option value="">All Types</option>
          <option th:each="t : ${types}"
                  th:value="${t.id}"
                  th:text="${t.name}"
                  th:selected="${typeId != null and typeId == t.id}">
          </option>
        </select>

        <select name="status" class="form-select w-auto">
          <option value="">All Statuses</option>
          <option value="true" th:selected="${status != null and status == true}">Active</option>
          <option value="false" th:selected="${status != null and status == false}">Inactive</option>
        </select>

        <input type="text" name="keyword" class="form-control w-auto" placeholder="Enter keyword(s) to search" th:value="${keyword}">
        <button type="submit" class="btn btn-secondary">Search</button>
      </div>

      <div>
        <a th:href="@{/settings/new}" class="btn btn-primary"><i class="fa fa-plus"></i> New Setting</a>
      </div>
    </form>

    <table class="table table-bordered table-striped mt-3">
      <thead class="table-light">
      <tr>
        <th>
          <a th:href="@{/settings(typeId=${typeId},status=${status},keyword=${keyword},sortField='id',sortDir=${sortField=='id' and sortDir=='asc' ? 'desc' : 'asc'})}">
            Id <i class="fa" th:classappend="${sortField == 'id' ? (sortDir == 'asc' ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort'}"></i>
          </a>
        </th>
        <th>
          <a th:href="@{/settings(typeId=${typeId},status=${status},keyword=${keyword},sortField='name',sortDir=${sortField=='name' and sortDir=='asc' ? 'desc' : 'asc'})}">
            Name <i class="fa" th:classappend="${sortField == 'name' ? (sortDir == 'asc' ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort'}"></i>
          </a>
        </th>
        <th>Type</th>
        <th>
          <a th:href="@{/settings(typeId=${typeId},status=${status},keyword=${keyword},sortField='value',sortDir=${sortField=='value' and sortDir=='asc' ? 'desc' : 'asc'})}">
            Value <i class="fa" th:classappend="${sortField == 'value' ? (sortDir == 'asc' ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort'}"></i>
          </a>
        </th>
        <th>
          <a th:href="@{/settings(typeId=${typeId},status=${status},keyword=${keyword},sortField='priority',sortDir=${sortField=='priority' and sortDir=='asc' ? 'desc' : 'asc'})}">
            Priority <i class="fa" th:classappend="${sortField == 'priority' ? (sortDir == 'asc' ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort'}"></i>
          </a>
        </th>
        <th>
          <a th:href="@{/settings(typeId=${typeId},status=${status},keyword=${keyword},sortField='status',sortDir=${sortField=='status' and sortDir=='asc' ? 'desc' : 'asc'})}">
            Status <i class="fa" th:classappend="${sortField == 'status' ? (sortDir == 'asc' ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort'}"></i>
          </a>
        </th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="s : ${settingList}">
        <td th:text="${s.id}"></td>
        <td th:text="${s.name}"></td>
        <td th:text="${s.type != null ? s.type.name : ''}"></td>
        <td th:text="${s.value}"></td>
        <td th:text="${s.priority}"></td>
        <td>
          <span class="status-badge" th:classappend="${!s.status ? 'status-inactive':''}" th:text="${s.status ? 'Active' : 'Inactive'}"></span>
        </td>
        <td>
          <a th:href="@{/settings/{id}(id=${s.id})}" class="btn btn-sm btn-primary"><i class="fa fa-edit"></i> Edit</a>
          <a th:href="@{/settings/{id}/toggle(id=${s.id})}"
             class="btn btn-sm" th:classappend="${s.status ? 'btn-danger' : 'btn-success'}">
            <i class="fa" th:classappend="${s.status ? 'fa-ban' : 'fa-check'}"></i> 
            <span th:text="${s.status ? 'Deactivate' : 'Activate'}"></span>
          </a>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(settingList)}">
        <td colspan="7" class="text-center">No data found</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
