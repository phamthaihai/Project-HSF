<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Setting List</title>
  <style>
    body {
      font-family: "Times New Roman", serif;
      background: #fff;
      margin: 30px;
    }

    .container {
      width: 980px;
      margin: 0 auto;
      border: 1px solid #333;
      padding: 16px;
      background: #f8f8f8;
    }

    .title {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .filters {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    select, input, button {
      height: 32px;
      padding: 4px 8px;
      border: 1px solid #999;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border: 1px solid #999;
      padding: 8px;
      text-align: left;
    }

    th {
      background: #ddd;
    }

    .msg {
      color: green;
      margin-bottom: 10px;
    }

    .err {
      color: red;
      margin-bottom: 10px;
    }

    a {
      color: blue;
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="title">Setting List</div>

  <div th:if="${msg}" class="msg" th:text="${msg}"></div>
  <div th:if="${err}" class="err" th:text="${err}"></div>

  <form th:action="@{/settings}" method="get" class="top-bar">
    <div class="filters">
      <select name="typeId">
        <option value="">All Types</option>
        <option th:each="t : ${types}"
                th:value="${t.id}"
                th:text="${t.name}"
                th:selected="${typeId != null and typeId == t.id}">
        </option>
      </select>

      <select name="status">
        <option value="">All Statuses</option>
        <option value="true" th:selected="${status != null and status == true}">Active</option>
        <option value="false" th:selected="${status != null and status == false}">Inactive</option>
      </select>

      <input type="text" name="keyword" placeholder="Enter keyword(s) to search" th:value="${keyword}">
      <button type="submit">Search</button>
    </div>

    <div>
      <a th:href="@{/settings/new}">New Setting</a>
    </div>
  </form>

  <table>
    <thead>
    <tr>
      <th>
        <a th:href="@{/settings(typeId=${typeId},status=${status},keyword=${keyword},sortField='id',sortDir=${sortField=='id' and sortDir=='asc' ? 'desc' : 'asc'})}">Id</a>
      </th>
      <th>
        <a th:href="@{/settings(typeId=${typeId},status=${status},keyword=${keyword},sortField='name',sortDir=${sortField=='name' and sortDir=='asc' ? 'desc' : 'asc'})}">Name</a>
      </th>
      <th>Type</th>
      <th>
        <a th:href="@{/settings(typeId=${typeId},status=${status},keyword=${keyword},sortField='value',sortDir=${sortField=='value' and sortDir=='asc' ? 'desc' : 'asc'})}">Value</a>
      </th>
      <th>
        <a th:href="@{/settings(typeId=${typeId},status=${status},keyword=${keyword},sortField='priority',sortDir=${sortField=='priority' and sortDir=='asc' ? 'desc' : 'asc'})}">Priority</a>
      </th>
      <th>
        <a th:href="@{/settings(typeId=${typeId},status=${status},keyword=${keyword},sortField='status',sortDir=${sortField=='status' and sortDir=='asc' ? 'desc' : 'asc'})}">Status</a>
      </th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="s : ${settingList}">
      <td th:text="${s.id}"></td>
      <td th:text="${s.name}"></td>
      <td th:text="${s.type != null ? s.type.name : ''}"></td>
      <td th:text="${s.value}"></td>
      <td th:text="${s.priority}"></td>
      <td th:text="${s.status ? 'Active' : 'Inactive'}"></td>
      <td>
        <a th:href="@{/settings/{id}(id=${s.id})}">Edit</a>
        &nbsp;
        <a th:href="@{/settings/{id}/toggle(id=${s.id})}"
           th:text="${s.status ? 'Deactivate' : 'Activate'}"></a>
      </td>
    </tr>
    <tr th:if="${#lists.isEmpty(settingList)}">
      <td colspan="7">No data found</td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
