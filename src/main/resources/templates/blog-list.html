<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Blog List</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f6fa; margin: 0; padding: 24px; }
    .container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
    .left, .right { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    .post-item { display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid #e5e7eb; }
    .post-item:last-child { border-bottom: none; }
    .thumb { width: 180px; height: 110px; object-fit: cover; border-radius: 10px; border: 1px solid #ddd; }
    .content { flex: 1; }
    .content h3 { margin: 0 0 8px; }
    .content p { margin: 0 0 8px; color: #555; }
    input, select, button { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; }
    button { background: #2563eb; color: white; cursor: pointer; }
    a { text-decoration: none; color: #2563eb; }
    .back-home { display: inline-block; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="container">
  <div class="left">
    <a class="back-home" th:href="@{/}">← Back to Home</a>
    <h2>Blog List</h2>

    <div class="post-item" th:each="b : ${blogs}">
      <img class="thumb"
           th:src="${b.thumbnailUrl != null && !#strings.isEmpty(b.thumbnailUrl)} ? @{${b.thumbnailUrl}} : 'https://picsum.photos/300/180'"
           alt="thumbnail">

      <div class="content">
        <h3>
          <a th:href="@{'/blogs/' + ${b.postId}}" th:text="${b.name}"></a>
        </h3>
        <p th:text="${b.description}"></p>
        <small>
          Category:
          <span th:text="${b.type}"></span>
          |
          Author:
          <span th:text="${b.user != null ? b.user.fullName : 'N/A'}"></span>
          |
          Updated:
          <span th:text="${b.updatedAt != null ? #temporals.format(b.updatedAt, 'dd/MM/yyyy HH:mm') : ''}"></span>
        </small>
      </div>
    </div>

    <div th:if="${#lists.isEmpty(blogs)}">No published blogs found.</div>
  </div>

  <div class="right">
    <h3>Search Blog(s)</h3>
    <form method="get" th:action="@{/blogs}">
      <input type="text" name="keyword" placeholder="Type keyword..." th:value="${keyword}">

      <select name="category">
        <option value="">All Categories</option>
        <option th:each="c : ${categories}" th:value="${c}" th:text="${c}" th:selected="${category == c}"></option>
      </select>

      <button type="submit">Search</button>
    </form>
  </div>
</div>
</body>
</html>
