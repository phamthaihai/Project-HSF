<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Learning Enrollment | HSF Project</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f1f5f9;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 760px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 28px;
            color: #1e293b;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 18px;
        }

        .field {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #475569;
        }

        input, textarea {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input[readonly] {
            background-color: #f8fafc;
            color: #64748b;
            cursor: not-allowed;
        }

        textarea {
            height: 100px;
            resize: none;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-submit {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: #1d4ed8;
        }

        .error-box {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #fecaca;
        }

        .rejection-box {
            background: #fffbeb;
            color: #92400e;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #fef3c7;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .rejection-title {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #b45309;
        }

        /* Style cho trạng thái invalid của HTML5 */
        input:invalid:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Learning Enrollment</h2>

    <div th:if="${err}" class="error-box" th:text="${err}"></div>

    <div th:if="${oldEnrollment != null and oldEnrollment.status == 'REJECTED'}" class="rejection-box">
        <span class="rejection-title">Lý do bị từ chối:</span>
        <span th:text="${oldEnrollment.rejectedNote}">Nội dung lý do từ chối sẽ hiển thị ở đây.</span>
    </div>

    <form th:action="@{/enroll}" method="post" id="enrollForm">
        <div class="row">
            <div class="field">
                <label>Course</label>
                <input type="text" th:value="${course.title}" readonly>
                <input type="hidden" name="courseId" th:value="${course.courseId}">
            </div>

            <div class="field">
                <label>Total Fee ($)</label>
                <input type="text" th:value="${course.price}" readonly>
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Full Name *</label>
                <input type="text" name="fullName"
                       th:value="${oldEnrollment != null ? oldEnrollment.fullName : user.fullName}"
                       minlength="3" maxlength="50" required>
            </div>

            <div class="field">
                <label>Email *</label>
                <input type="email" name="email"
                       th:value="${oldEnrollment != null ? oldEnrollment.email : user.email}"
                       required>
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Mobile *</label>
                <input type="text" name="mobile"
                       th:value="${oldEnrollment != null ? oldEnrollment.mobile : user.phone}"
                       pattern="^0[0-9]{9}$"
                       title="Vui lòng nhập số điện thoại 10 chữ số bắt đầu bằng 0"
                       required>
            </div>

            <div class="field">
                <label>Payment Method *</label>
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" name="paymentMethod" value="PAYOS"
                               th:checked="${oldEnrollment == null || oldEnrollment.paymentMethod == 'PAYOS'}" required>
                        Bank Transfer (PayOS)
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="paymentMethod" value="VNPAY"
                               th:checked="${oldEnrollment != null && oldEnrollment.paymentMethod == 'VNPAY'}" required>
                        Internet Banking (VNPay)
                    </label>
                </div>
            </div>
        </div>

        <div class="field">
            <label>Enroll Note</label>
            <textarea name="note" th:text="${oldEnrollment != null ? oldEnrollment.note : ''}"
                      placeholder="Enter your note (max 255 characters)..." maxlength="255"></textarea>
        </div>

        <button type="submit" class="btn-submit">Submit Enrollment</button>
    </form>
</div>

<script>
    // Client-side Validation Feedback
    const form = document.getElementById('enrollForm');

    form.addEventListener('submit', function (event) {
        if (!form.checkValidity()) {
            event.preventDefault(); // Chặn gửi form nếu HTML5 validate không vượt qua
            alert("Vui lòng điền đúng thông tin theo yêu cầu (Tên > 3 ký tự, SĐT đúng định dạng)!");
        }
    });
</script>

</body>
</html>
