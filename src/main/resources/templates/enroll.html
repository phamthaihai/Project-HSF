<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Learning Enrollment | HSF Project</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f1f5f9;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 760px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 28px;
            color: #1e293b;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 18px;
        }

        .field {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #475569;
        }

        input, textarea {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input[readonly] {
            background-color: #f8fafc;
            color: #64748b;
            cursor: not-allowed;
        }

        textarea {
            height: 100px;
            resize: none;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-submit {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: #1d4ed8;
        }

        .error-box {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Learning Enrollment</h2>

    <div th:if="${err}" class="error-box" th:text="${err}"></div>

    <form th:action="@{/enroll}" method="post">
        <div class="row">
            <div class="field">
                <label>Course</label>
                <input type="text" th:value="${course.title}" readonly>
                <input type="hidden" name="courseId" th:value="${course.courseId}">
            </div>

            <div class="field">
                <label>Total Fee ($)</label>
                <input type="text" th:value="${course.price}" readonly>
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Full Name *</label>
                <input type="text" name="fullName" th:value="${user.fullName}" required>
            </div>

            <div class="field">
                <label>Email *</label>
                <input type="email" name="email" th:value="${user.email}" required>
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Mobile *</label>
                <input type="text" name="mobile" th:value="${user.phone}" required>
            </div>

            <div class="field">
                <label>Payment Method *</label>
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" name="paymentMethod" value="PAYOS" checked required>
                        Bank Transfer (PayOS)
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="paymentMethod" value="VNPAY" required>
                        Internet Banking (VNPay)
                    </label>
                </div>
            </div>
        </div>

        <div class="field">
            <label>Enroll Note</label>
            <textarea name="note" placeholder="Enter your note..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Submit Enrollment</button>
    </form>
</div>

</body>
</html>
