<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Learning Enrollment</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
        }

        .container{
            width:700px;
            margin:40px auto;
            background:white;
            padding:25px;
            border:1px solid #ccc;
        }

        h2{
            margin-bottom:20px;
        }

        .row{
            display:flex;
            gap:20px;
            margin-bottom:15px;
        }

        .field{
            flex:1;
            display:flex;
            flex-direction:column;
        }

        label{
            font-size:14px;
            margin-bottom:5px;
        }

        input, textarea{
            padding:8px;
            border:1px solid #ccc;
            border-radius:3px;
        }

        textarea{
            height:70px;
        }

        .radio-group{
            display:flex;
            gap:15px;
            align-items:center;
            margin-top:5px;
        }

        button{
            margin-top:15px;
            padding:7px 15px;
            border:1px solid #aaa;
            background:#eee;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Learning Enrollment</h2>

    <form th:action="@{/enroll}" method="post">

        <div class="row">

            <div class="field">
                <label>Course</label>
                <input type="text" th:value="${course.title}" readonly>
                <input type="hidden" name="courseId" th:value="${course.courseId}">
            </div>

            <div class="field">
                <label>Total Fee ($)</label>
                <input type="text" th:value="${course.price}" readonly>
            </div>

        </div>


        <div class="row">

            <div class="field">
                <label>Full Name*</label>
                <input type="text" name="fullName">
            </div>

            <div class="field">
                <label>Email*</label>
                <input type="email" name="email">
            </div>

        </div>


        <div class="row">

            <div class="field">
                <label>Mobile*</label>
                <input type="text" name="mobile">
            </div>

            <div class="field">
                <label>Payment Method</label>

                <div class="radio-group">
                    <label>
                        <input type="radio" name="paymentMethod" value="PAYOS">
                        Bank Transfer
                    </label>

                    <label>
                        <input type="radio" name="paymentMethod" value="VNPAY">
                        Internet Banking
                    </label>
                </div>

            </div>

        </div>


        <div class="field">
            <label>Enroll Note</label>
            <textarea name="note"></textarea>
        </div>


        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
