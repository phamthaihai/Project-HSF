<<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Course Details</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f6f7fb;
        }

        .container{
            width:90%;
            margin:auto;
        }

        /* BOX */

        .box{
            border:2px solid #4c74af;
            padding:20px;
            margin-bottom:30px;
            background:white;
        }

        /* HEADER */

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        /* BUTTON */

        .btn-add{
            background:#2e7be6;
            color:white;
            padding:6px 12px;
            border-radius:3px;
            text-decoration:none;
        }

        /* TABLE */

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:15px;
        }

        table th{
            background:#f0f0f0;
            padding:10px;
            text-align:left;
        }

        table td{
            padding:10px;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f9f9f9;
        }

        /* STATUS BADGE */

        .status{
            background:#2ecc71;
            color:white;
            padding:3px 8px;
            border-radius:4px;
            font-size:12px;
        }

        /* ACTION BUTTON */

        .action-btn{
            padding:4px 6px;
            border-radius:3px;
            text-decoration:none;
            margin-right:5px;
        }

        .edit{
            background:#3fa9f5;
            color:white;
        }

        .delete{
            background:#e74c3c;
            color:white;
        }

        /* FORM */

        .form-row{
            display:flex;
            gap:20px;
            margin-bottom:15px;
        }

        .form-group{
            flex:1;
        }

        input, select, textarea{
            width:100%;
            padding:6px;
            border:1px solid #ccc;
        }

        textarea{
            height:120px;
        }

        /* THUMBNAIL */

        .thumbnail-box{
            width:200px;
        }

        .thumbnail-box img{
            width:100%;
            border:1px solid #ccc;
        }

        .submit-btn{
            margin-top:10px;
            padding:6px 15px;
        }
    </style>

</head>

<body>

<div class="container box">

    <h2>Course Details</h2>

    <form th:action="@{/courses/save}"
          th:object="${course}"
          method="post">

        <input type="hidden" th:field="*{courseId}">

        <div class="form-row">

            <div class="form-group">
                <label>Title</label>
                <input type="text" th:field="*{title}">
            </div>

            <div class="thumbnail-box">

                <label>Thumbnail</label>

                <img id="thumbnailPreview"
                     th:src="${course.thumbnailUrl != null ? course.thumbnailUrl : 'https://www.bing.com/images/search?view=detailV2&ccid=zk%2fp9P%2f8&id=B1FB048B5E79DF322B8D564F2FC7A5FE313B9670&thid=OIP.zk_p9P_8wN9a8rrdp9tG9AHaEo&mediaurl=https%3a%2f%2fwatermark.lovepik.com%2fphoto%2f50054%2f2332.jpg_wh1200.jpg&cdnurl=https%3a%2f%2fth.bing.com%2fth%2fid%2fR.ce4fe9f4fffcc0df5af2badda7db46f4%3frik%3dcJY7Mf6lxy9PVg%26pid%3dImgRaw%26r%3d0&exph=750&expw=1200&q=%e1%ba%a3nh+m%e1%ba%a1ng&FORM=IRPRST&ck=E755701B4D98313A5B35337AA5F9D333&selectedIndex=1&itb=0'}">

                <input type="text"
                       th:field="*{thumbnailUrl}"
                       id="thumbnailInput"
                       placeholder="Paste image link">

            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>Category</label>

                <!-- bind theo categoryId -->
                <select th:field="*{category.categoryId}">
                    <option value="">-- Select Category --</option>

                    <option th:each="c : ${categories}"
                            th:value="${c.categoryId}"
                            th:text="${c.name}">
                    </option>
                </select>

            </div>

            <div class="form-group">

                <label>Manager</label>

                <!-- bind theo instructor.id -->
                <select th:field="*{instructor.id}">
                    <option value="">-- Select Manager --</option>

                    <option th:each="u : ${managers}"
                            th:value="${u.id}"
                            th:text="${u.fullName}">
                    </option>
                </select>

            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>Level</label>

                <select th:field="*{level}">
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                </select>

            </div>

            <div class="form-group">
                <label>Duration</label>
                <input type="number" th:field="*{duration}">
            </div>

        </div>

        <div class="form-row">

            <div class="form-group">
                <label>Listed Price</label>
                <input type="number" step="0.01" th:field="*{price}">
            </div>

        </div>

        <div>
            <label>Description</label>
            <textarea th:field="*{description}"></textarea>
        </div>

        <br>

        <label>Status</label>

        <input type="checkbox" th:field="*{published}">
        Published

        <br><br>

        <button class="submit-btn">
            Submit
        </button>

    </form>

</div>

<script>

    document.getElementById("thumbnailInput").addEventListener("input", function(){

        let url = this.value;

        if(url){
            document.getElementById("thumbnailPreview").src = url;
        }

    });

</script>

</body>
</html>
