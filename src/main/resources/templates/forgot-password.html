<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f6fa; margin: 0; padding: 40px; }
    .box { max-width: 420px; margin: auto; background: white; padding: 24px; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    h2 { margin-top: 0; text-align: center; }
    .row { margin-bottom: 14px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; }
    input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    .error { color: red; font-size: 13px; margin-top: 4px; }
    .msg-error { color: red; margin-bottom: 12px; }
    button { width: 100%; padding: 10px; border: none; border-radius: 6px; background: #2563eb; color: white; cursor: pointer; }
    a { color: #2563eb; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>
<div class="box">
  <h2>Forgot Password</h2>

  <div th:if="${error}" class="msg-error" th:text="${error}"></div>

  <form th:action="@{/forgot-password}" th:object="${forgotPasswordDTO}" method="post">
    <div class="row">
      <label>Email</label>
      <input type="email" th:field="*{email}">
      <div class="error" th:errors="*{email}"></div>
    </div>

    <button type="submit">Gửi mã OTP</button>
  </form>

  <div style="margin-top: 12px; text-align: center;">
    <a th:href="@{/login}">Back to login</a>
  </div>
</div>
</body>
</html>
