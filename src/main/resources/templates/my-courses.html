<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Courses</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }

        .container {
            width: 1180px;
            max-width: calc(100% - 40px);
            margin: 32px auto;
        }

        .page-title {
            font-size: 34px;
            font-weight: 800;
            margin: 0 0 8px;
        }

        .page-subtitle {
            color: #6b7280;
            margin-bottom: 22px;
        }

        .err {
            color: #b91c1c;
            background: #fef2f2;
            border: 1px solid #fecaca;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .empty {
            background: white;
            padding: 22px;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
        }

        .toolbar {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 20px;
        }

        .link-btn {
            display: inline-block;
            text-decoration: none;
            background: #eff6ff;
            color: #2563eb;
            border: 1px solid #bfdbfe;
            padding: 10px 14px;
            border-radius: 10px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 22px;
        }

        .card {
            display: flex;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
            min-height: 220px;
        }

        .thumb-wrap {
            width: 260px;
            min-width: 260px;
            background: #e5e7eb;
        }

        .thumb {
            width: 100%;
            height: 100%;
            min-height: 220px;
            object-fit: cover;
            display: block;
        }

        .content {
            flex: 1;
            padding: 18px;
            display: flex;
            flex-direction: column;
        }

        .course-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 12px;
            line-height: 1.35;
        }

        .enrolled-date {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 24px;
        }

        .progress-section {
            margin-bottom: 20px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .progress-track {
            height: 10px;
            background: #f3f4f6;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #2563eb;
            border-radius: 5px;
        }

        .actions-badges {
            margin-bottom: 10px;
        }

        .badge-primary {
            display: inline-flex;
            align-items: center;
            background: #2563eb;
            color: white;
            font-size: 13px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 6px;
        }

        .badge-primary span {
            margin-left: 5px;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 11px 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            border: 1px solid #2563eb;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-outline {
            background: white;
            color: #111827;
            border: 1px solid #d1d5db;
        }

        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 780px) {
            .container {
                max-width: calc(100% - 24px);
            }

            .card {
                flex-direction: column;
            }

            .thumb-wrap {
                width: 100%;
                min-width: 100%;
            }

            .thumb {
                min-height: 220px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="page-title">My Courses</h1>
    <div class="page-subtitle">Courses you can start learning right now.</div>

    <div th:if="${err}" class="err" th:text="${err}"></div>

    <div class="toolbar">
        <a th:href="@{/}" class="link-btn" style="background: white; color: #374151; border-color: #d1d5db;">Back to Home</a>
        <a th:href="@{/public-courses}" class="link-btn">Browse More Courses</a>
    </div>

    <div th:if="${#lists.isEmpty(courses)}" class="empty">
        No courses available in your My Courses list.
    </div>

    <div class="grid" th:if="${!#lists.isEmpty(courses)}">
        <div class="card" th:each="c : ${courses}">
            <div class="thumb-wrap">
                <img class="thumb"
                     th:src="${c.thumbnailUrl != null and !#strings.isEmpty(c.thumbnailUrl)
                              ? c.thumbnailUrl
                              : 'https://via.placeholder.com/600x350?text=My+Course'}"
                     alt="thumbnail">
            </div>

            <div class="content">
                <div class="course-title" th:text="${c.title}"></div>

                <div class="enrolled-date" th:if="${c.enrolledDate != null}">
                    Enrolled on: <span th:text="${#temporals.format(c.enrolledDate, 'yyyy-MM-dd HH:mm:ss')}"></span>
                </div>
                <div class="enrolled-date" th:unless="${c.enrolledDate != null}">
                    Enrolled on: N/A
                </div>

                <div class="progress-section">
                    <div class="progress-header">
                        <span class="progress-label">Progress</span>
                        <span class="progress-percent" th:text="${c.progressPercent != null ? #numbers.formatDecimal(c.progressPercent, 1, 2) + '%' : '0.00%'}">0.00%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill" th:style="'width: ' + ${c.progressPercent != null ? c.progressPercent : 0} + '%;'"></div>
                    </div>
                </div>

                <div class="actions-badges">
                    <span class="badge badge-primary">▶ <span th:text="${c.progressStatus != null ? c.progressStatus : 'In Progress'}">In Progress</span></span>
                </div>

                <div class="actions">
                    <a class="btn btn-primary"
                       th:href="@{/my-courses/{id}/learn(id=${c.courseId})}">
                        ▶ Start Learning
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
